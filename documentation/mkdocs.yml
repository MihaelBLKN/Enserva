site_name: Enserva
site_description: Tick-based UDP networking runtime for authoritative multiplayer Go servers.
site_url: https://mihaelblkn.github.io/Enserva/
repo_url: https://github.com/MihaelBLKN/Enserva
repo_name: MihaelBLKN/Enserva
edit_uri: edit/main/documentation/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quick-start.md
  - Features:
      - Interest Management: features/interest-management.md
  - Guides:
      - Configuration: configuration.md
      - Architecture: architecture.md
      - Examples: examples.md
  - API Reference:
      - Overview: developer-api.md
      - network: api/network.md
      - Wire Protocol: api/wire-protocol.md
      - Implementing Objects: api/netobjects.md
  - FAQ: faq.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MihaelBLKN/Enserva
      name: Enserva on GitHub

copyright: Copyright &copy; 2026 Enserva contributors. Licensed under the MIT license.
