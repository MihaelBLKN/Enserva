<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enserva Debug Client</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <main class="debug-shell">
    <header class="debug-header">
      <h1>Enserva Debug Client</h1>
      <div id="status" class="status status--connecting">Connecting...</div>
    </header>

    <canvas id="game" width="720" height="405" aria-label="Game debug canvas"></canvas>
  </main>

  <script defer src="./scripts/config.js?v=7"></script>
  <script defer src="./scripts/input.js?v=7"></script>
  <script defer src="./scripts/hitboxes.js?v=7"></script>
  <script defer src="./scripts/network.js?v=7"></script>
  <script defer src="./scripts/renderer.js?v=7"></script>
  <script defer src="./scripts/state.js?v=7"></script>
  <script defer src="./scripts/ui.js?v=7"></script>
  <script defer src="./scripts/main.js?v=7"></script>
</body>
</html>
